{% extends 'base.html' %}

{% block title %}Сдать задание{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{{ assignment.title }}</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Ваш ответ</label>
                        <textarea name="content" class="form-control" rows="8">{{ submission.content|default:'' }}</textarea>
                        <small class="text-muted">Опишите решение задания или прикрепите файл</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Файл (необязательно)</label>
                        <input type="file" name="attachment" class="form-control">
                        {% if submission.attachment %}
                            <small class="text-muted">Текущий файл: {{ submission.attachment.name }}</small>
                        {% endif %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'assignment_detail' assignment.id %}" class="btn btn-secondary">Отмена</a>
                        <div>
                            <button type="submit" name="action" value="draft" class="btn btn-outline-primary">
                                <i class="bi bi-save"></i> Сохранить черновик
                            </button>
                            <button type="submit" name="action" value="submit" class="btn btn-success">
                                <i class="bi bi-cloud-upload"></i> Сдать задание
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
